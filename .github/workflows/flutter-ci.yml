name: Flutter Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app-flutter/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('app-flutter/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zikflow-android-apk
          path: app-flutter/build/app/outputs/flutter-apk/app-release.apk
